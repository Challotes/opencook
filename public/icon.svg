<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Outer black field. Full-bleed: Android adaptive masking crops this to a
       circle/squircle, iOS to a squircle, desktop shows it whole. -->
  <rect width="512" height="512" rx="112" fill="#000000"/>
  <!-- Thick solid amber ring, inset 40px — well inside the Android adaptive
       safe-zone (central ~80%), so the band survives the circle/squircle crop
       on Android and reads as an intentional border on every shape (not the
       old thin hairline that looked like an error line). -->
  <rect x="40" y="40" width="432" height="432" rx="84" fill="#f59e0b"/>
  <!-- Inner black panel, inset a further 18px — leaves a solid ~18px amber band
       visible all the way around. -->
  <rect x="58" y="58" width="396" height="396" rx="68" fill="#000000"/>
  <!-- "OC" — O amber (Open) + C white (Cook), enlarged + centered on the canvas. -->
  <text x="256" y="256"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
    font-weight="800" font-size="248" text-anchor="middle"
    dominant-baseline="central" letter-spacing="-12"
  ><tspan fill="#f59e0b">O</tspan><tspan fill="#ffffff">C</tspan></text>
</svg>
