<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed amber (brand amber-400 #fbbf24 — matches the "Open" wordmark).
       Bleeds to every edge, so ANY mask (Android circle/squircle, iOS squircle,
       desktop rounded-square) crops solid amber — there is no thin edge band left
       to clip into a hairline. rx keeps the un-masked desktop corners soft. -->
  <rect width="512" height="512" rx="112" fill="#fbbf24"/>
  <!-- Black center medallion (circle, r=196 ≈ 76.5% Ø — inside Android's ~80%
       safe-zone) so the OC + a clean amber ring survive every crop. -->
  <circle cx="256" cy="256" r="196" fill="#000000"/>
  <!-- "OC" centered in the medallion: O amber (Open) on black, C white (Cook). -->
  <text x="256" y="256"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
    font-weight="800" font-size="228" text-anchor="middle"
    dominant-baseline="central" letter-spacing="-12"
  ><tspan fill="#fbbf24">O</tspan><tspan fill="#ffffff">C</tspan></text>
</svg>
